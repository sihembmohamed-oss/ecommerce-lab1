---
- name: Deploy E-Commerce App
  hosts: web
  become: yes
  gather_facts: yes
  tasks:

    - name: Wait for apt lock
      shell: while sudo fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do sleep 5; done
      changed_when: false

    - name: Update apt cache
      apt:
        update_cache: yes
      retries: 5
      delay: 10

    - name: Install Docker dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
        state: present

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Install Docker Compose
      get_url:
        url: https://github.com/docker/compose/releases/download/v2.24.0/docker-compose-linux-x86_64
        dest: /usr/local/bin/docker-compose
        mode: '0755'

    - name: Create app directory
      file:
        path: /home/ubuntu/app
        state: directory
        owner: ubuntu
        group: ubuntu

    - name: Copy docker-compose.yml
      copy:
        src: docker-compose.yml
        dest: /home/ubuntu/app/docker-compose.yml
        owner: ubuntu
        group: ubuntu

    - name: Copy nginx.conf
      copy:
        src: nginx.conf
        dest: /home/ubuntu/app/nginx.conf
        owner: ubuntu
        group: ubuntu

    - name: Copy app folder
      copy:
        src: app/
        dest: /home/ubuntu/app/app/
        owner: ubuntu
        group: ubuntu

    - name: Run Docker Compose
      shell: |
        cd /home/ubuntu/app
        /usr/local/bin/docker-compose up -d --build